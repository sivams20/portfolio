<div class="card">
    <div class="card-block">
      <h2>Contact</h2>
      <form action="" [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="reveal-content">
        <div class="form-group">
          <input formControlName="email" type="email" class="form-control" id="email" placeholder="Email">
        </div>
        <div class="form-group">
          <input formControlName="subject" type="text" class="form-control" id="subject" placeholder="Subject">
        </div>
        <div class="form-group">
          <textarea formControlName="message" class="form-control" rows="5" placeholder="Enter your message"></textarea>
        </div>
        <div class="form-group">
          <button type="submit" class="btn btn-primary" [disabled]="contactForm.invalid">Send message</button>
        </div> 
      </form>
    </div>
  </div>
